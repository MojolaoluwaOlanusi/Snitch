name: Realtime integration tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration:
    name: Realtime integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout repository (manual clone to avoid action resolution warnings)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} .

      - name: Install Node.js 18
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run createRoomAndAddParticipant integration test
        working-directory: backend
        env:
          REDIS_URL: 'redis://127.0.0.1:6379'
        run: npm run test:create-add

      - name: Run remove-participant preload/reload test
        working-directory: backend
        env:
          REDIS_URL: 'redis://127.0.0.1:6379'
        run: npm run test:redis-reload
