<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <!-- ========== INLINED CRITICAL CSS ========== -->
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,-apple-system,sans-serif;}

        /* login page essential styles */
        .min-h-screen{min-height:100vh}
        .bg-blue-200{background-color:#bfdbfe}
        .flex{display:flex}
        .items-center{align-items:center}
        .justify-center{justify-content:center}
        .px-4{padding-left:1rem;padding-right:1rem}
        .py-8{padding-top:2rem;padding-bottom:2rem}
        @media(min-width:640px){.sm\:py-16{padding-top:4rem;padding-bottom:4rem}}
        .w-full{width:100%}
        .max-w-md{max-width:28rem}
        .bg-white{background-color:#fff}
        .rounded-2xl{border-radius:1rem}
        .shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -4px rgba(0,0,0,0.1)}
        .p-6{padding:1.5rem}
        @media(min-width:640px){.sm\:p-10{padding:2.5rem}}
        @media(min-width:768px){.md\:p-20{padding:5rem}}
        .text-center{text-align:center}
        .mb-8{margin-bottom:2rem}
        .text-2xl{font-size:1.5rem;line-height:2rem}
        .font-bold{font-weight:700}
        .text-blue-600{color:#2563eb}
        .mb-2{margin-bottom:0.5rem}
        .text-sm{font-size:0.875rem;line-height:1.25rem}
        .space-y-6>:not([hidden])~:not([hidden]){margin-top:1.5rem}
        .auth-input-label{display:block;font-size:.875rem;font-weight:500;color:#fff;margin-bottom:.5rem}
        .relative{position:relative}
        .input{width:100%;background-color:#eff6ff;border:1px solid #1d4ed8;border-radius:.5rem;padding:.5rem .5rem .5rem 2.5rem;font-size:.875rem;color:#6b7280;outline:none}
        .input::placeholder{color:#9ca3af}
        .auth-input-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#93c5fd;width:1.25rem;height:1.25rem}
        .btn{display:inline-flex;align-items:center;justify-content:center;padding:.5rem 1rem;border-radius:.5rem;font-weight:500;transition:all .2s;cursor:pointer}
        .btn-primary{background-color:#2563eb;color:#fff}
        .btn-primary:hover{background-color:#1d4ed8}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .auth-link{display:block;padding:.5rem 1rem;background-color:rgba(37,99,235,0.1);border-radius:.5rem;color:#2563eb;text-decoration:none;font-size:.875rem;transition:color .2s}
        .auth-link:hover{color:#3b82f6}
        .overflow-hidden{overflow:hidden}

        /* static skeleton */
        .skeleton-app{display:flex;height:100vh;width:100%}
        .skeleton-sidebar{width:80px;border-right:1px solid #e5e7eb;background:white;padding:16px;display:flex;flex-direction:column;gap:16px;animation:pulse 1.5s infinite}
        .skeleton-sidebar .circle{width:40px;height:40px;border-radius:50%;background:#e5e7eb;margin:0 auto}
        .skeleton-sidebar .links{display:flex;flex-direction:column;gap:12px;margin-top:8px}
        .skeleton-sidebar .link{height:32px;background:#e5e7eb;border-radius:6px}
        .skeleton-main{flex:1;padding:24px;display:flex;flex-direction:column;gap:16px;animation:pulse 1.5s infinite}
        .skeleton-main .header{height:32px;background:#e5e7eb;border-radius:8px;width:40%}
        .skeleton-main .card{height:160px;background:#e5e7eb;border-radius:12px}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        @media(min-width:1024px){.skeleton-sidebar{width:225px}}

        /* basic modal fixes */
        .modal-backdrop{background-color:rgba(0,0,0,0.6);z-index:998}
        dialog.modal,.modal{z-index:9999}
    </style>

    <!-- Load the full stylesheet asynchronously -->
    <script>
        (function() {
            var l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = '/src/index.css';
            document.head.appendChild(l);
        })();
    </script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('snitch-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        })();
    </script>

    <!-- Preload only the most critical images -->
    <link rel="preload" as="image" href="/login.webp" />
    <link rel="preload" as="image" href="/avatar-placeholder.png" />

    <link rel="icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Snitch – Connect with friends instantly. Chat, create posts, share stickers, and more in real time." />
    <title>Snitch</title>
</head>

<body>
<!-- Static skeleton (visible until React mounts) -->
<div id="root">
    <div class="skeleton-app">
        <div class="skeleton-sidebar">
            <div class="circle"></div>
            <div class="links">
                <div class="link"></div><div class="link"></div><div class="link"></div>
                <div class="link"></div><div class="link"></div><div class="link"></div>
                <div class="link"></div><div class="link"></div>
            </div>
        </div>
        <div class="skeleton-main">
            <div class="header"></div>
            <div class="card"></div>
            <div class="card"></div>
        </div>
    </div>
</div>

<script type="module" src="src/main.jsx"></script>
</body>
</html>
